services:
  - type: web
    name: yatra-saarthi
    env: python
    buildCommand: pip install -r requirements.txt && python seed_buses.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    envVars:
      - key: AVIATIONSTACK_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
